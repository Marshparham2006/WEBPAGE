<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>my website</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
        }

        .top {
            background: #3a251e;
            color: white;
            text-align: center;
            padding: 30px 20px;
        }

        .top h1 {
            margin: 0;
            font-size: 28px;
        }

        .top p {
            margin: 10px 0 0;
            font-size: 16px;
        }

        .menu {
            background: #2c3e50;
            text-align: center;
            padding: 12px 0;
            position: sticky;
            top: 0;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #f39c12;
        }

        .box {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-3px);
        }

        .box h2 {
            margin-top: 0;
            border-right: 4px solid #f39c12;
            padding-right: 12px;
            font-size: 22px;
        }

        .about-inner {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .about-inner div {
            flex: 1;
        }

        .about-inner img {
            width: 100%;
            border-radius: 8px;
            background: #ccc;
        }

        .services-list {
            list-style: none;
            padding: 0;
        }

        .services-list li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 10px 15px;
            border-right: 3px solid #f39c12;
            border-radius: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #f39c12;
        }

        button {
            background: #2c3e50;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f39c12;
        }

        .footer {
            background: #1e2a3a;
            color: white;
            text-align: center;
            padding: 18px;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="top">
    <h1> my personal website</h1>
    <p> a peronal website for practicing</p>
</div>

<div class="menu">
    <a href="#home">home</a>
    <a href="#about">about</a>
    <a href="#services">services</a>
    <a href="#contact">contact</a>
</div>

<div class="box" id="about">
    <h2>darbare man</h2>
    <div class="about-inner">
        <div>
            <p>dar in bakhsh mitavanid khodetan ro moarefi konid </p>
        </div>
        <div>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQiansSb9YSEr566qOCUAVU2TjIdF6THUYHwg&s"alt="aks">
        </div>
    </div>
</div>

<div class="box" id="services">
    <h2>my services</h2>
    <ul class="services-list">
        <li>javascript</li>
        <li>html and css</li>
        <li> make a simple webpage</li>
    </ul>
</div>

<div class="box" id="contact">
    <h2>contact form</h2>
    <form onsubmit="alert('message recieved'); this.reset(); return false;">
        <label>esmetoon</label>
        <input type="text" required>
        <label>email:</label>
        <input type="email" required>
        <button type="submit">darhale ersal</button>
    </form>
</div>

<div class="footer">
   parham babaei 1405
</div>

</body>
</html>
